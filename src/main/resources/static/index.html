<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PDF Unlocker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .inner-container {
            width: 500px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .inner-container input {
            padding: 10px 16px;
            border: 1px solid #BBB;
        }

        .inner-container label {
            margin-left: 16px;
        }

        .input-container {
            display: flex;
        }

        .lbl-input-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
    </style>
</head>

<body>
    <h1>PDF Unlock Inator</h1>
    <form action="http://localhost:8080/unlock" method="post" enctype="multipart/form-data">
        <div class="inner-container">
            <span class="lbl-input-container">
                <label for="file">Select File</label>
                <input type="file" name="file" id="file" required>
            </span>
            <span class="lbl-input-container">
                <label for="file-password">PDF Password</label>
                <input type="password" name="password" id="file-password" required>
            </span>
            <span class="input-container">
                <input type="reset" value="Reset">
                <input type="submit" value="Submit">
            </span>
        </div>
    </form>
</body>

</html>
